<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Password Strength Box</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Registrasi</h2>

    <label>Password</label>
    <input type="password" id="password" autocomplete="off" placeholder="Masukkan password">

    <div class="strength-box">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>

    <p id="strength-text"></p>
</div>

<script src="script.js"></script>
</body>
</html>
